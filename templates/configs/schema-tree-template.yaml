# ============================================
# 树表 Schema 模板 - 树形结构表定义
# ============================================
# 适用场景: 部门管理、分类管理、地区管理等层级结构
#
# 与单表的区别:
#   - tpl_type: tree（而非默认的 crud）
#   - 需要 tree_config 配置
#   - 必须有 parent_id、ancestors、order_num 字段
#   - 这些字段由 TreeEntity 基类提供，Entity 中不重复生成
# ============================================

table_name: your_tree_table        # 数据库表名
table_comment: 你的树形功能          # 表注释
module: test                        # 模块名
business: your_tree_table           # 业务名
function_name: 你的树形功能          # 功能名称
sort: 1                             # 菜单排序号
tpl_type: tree                      # ← 关键：指定为树表

# ---------- 树表专用配置 ----------
tree_config:
  tree_code: id                     # 节点ID字段（通常是主键）
  tree_parent_code: parent_id       # 父节点ID字段
  tree_name: name                   # 树节点显示名称字段（改为你的名称字段）

# ---------- 字典定义（可选）----------
dicts:
  # 示例：状态字典（也可直接用系统字典 sys_normal_disable）
  - dict_type: sys_your_status
    dict_name: 状态
    sort: 1
    data:
      - label: 正常
        value: '0'
        sort: 1
        list_class: success
      - label: 停用
        value: '1'
        sort: 2
        list_class: danger

# ---------- 字段定义 ----------
columns:
  # ===== 主键（必须）=====
  - name: id
    comment: 节点ID
    type: bigint
    is_pk: true
    is_auto_increment: true
    is_insert: false
    is_edit: false
    is_list: false
    is_query: false
    java_type: Long
    component: Input

  # ===== 树表必备字段（TreeEntity 自动处理）=====
  - name: parent_id
    comment: 父节点ID
    type: bigint
    is_required: true
    java_type: Long
    component: Input

  - name: ancestors
    comment: 祖级列表
    type: varchar
    length: 500
    is_insert: false
    is_edit: false
    is_list: false
    is_query: false
    java_type: String
    component: Input

  # ===== 业务字段（树名称放在 order_num 前面，列表展示顺序：名称→排序→状态→时间）=====
  - name: name
    comment: 名称
    type: varchar
    length: 100
    is_required: true
    query_type: LIKE
    java_type: String
    component: Input

  - name: order_num
    comment: 显示排序
    type: int
    is_required: true
    java_type: Integer
    component: InputNumber

  # ===== 状态（使用系统字典或自定义）=====
  - name: status
    comment: 状态
    type: char
    length: 1
    java_type: String
    component: Radio
    dict_type: sys_normal_disable   # 使用系统字典

  # ===== 创建时间 =====
  - name: create_time
    comment: 创建时间
    type: datetime
    is_insert: false
    is_edit: false
    is_list: true
    is_query: false
    java_type: Date
    component: DatePicker
    date_format: YYYY-MM-DD HH:mm:ss
