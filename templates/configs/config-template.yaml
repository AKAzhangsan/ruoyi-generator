# ============================================
# Config 模板 - 生成代码的完整配置（第3步输入）
# ============================================
# 此文件由第2步自动生成，通常不需要手动创建
# 但你可以手动编辑生成后的文件来微调每个字段的行为
#
# 与 Schema 的区别:
#   Schema（简洁版）→ 自动生成 → Config（完整版）→ 生成代码
#   Schema 只需定义核心属性，Config 包含所有细节
#
# 生成命令:
#   python3 main_allinone.py --schema configs/generated/xxx-config.yaml --step=generate
# ============================================

table_name: your_table_name
table_comment: 你的业务功能
module: test
business: your_table_name
function_name: 你的功能名称
sort: 1

columns:
  - name: id
    comment: 主键ID
    type: bigint
    is_pk: true
    is_auto_increment: true
    is_insert: false              # 新增时不显示
    is_edit: false                # 编辑时不显示
    is_list: false                # 列表不显示
    is_query: false               # 不作为查询条件
    is_required: false
    query_type: EQ
    java_type: Long
    component: Input

  - name: name
    comment: 名称
    type: varchar
    length: 100
    is_insert: true               # ← 可手动修改
    is_edit: true                 # ← 可手动修改
    is_list: true                 # ← 可手动修改
    is_query: true                # ← 可手动修改
    is_required: true             # ← 可手动修改
    query_type: LIKE              # ← 可手动修改
    java_type: String
    component: Input

  - name: status
    comment: 状态
    type: char
    length: 1
    is_insert: true
    is_edit: true
    is_list: true
    is_query: true
    is_required: true
    query_type: EQ
    java_type: String
    component: Radio
    dict_type: sys_normal_disable # 字典类型

  - name: create_time
    comment: 创建时间
    type: datetime
    is_insert: false
    is_edit: false
    is_list: true
    is_query: true
    is_required: false
    query_type: BETWEEN
    java_type: Date
    component: DatePicker
    date_format: YYYY-MM-DD HH:mm:ss

# 字典定义（与 Schema 中相同）
dicts:
  - dict_type: sys_your_status
    dict_name: 业务状态
    sort: 1
    data:
      - label: 启用
        value: '0'
        sort: 1
        is_default: Y
        list_class: success
      - label: 禁用
        value: '1'
        sort: 2
        is_default: N
        list_class: danger

# ============================================
# Config 与 Schema 的字段对比
# ============================================
# Schema（简洁版）只需写:          Config（完整版）自动补全:
#   - name: name                    - name: name
#     type: varchar                   type: varchar
#     length: 100                     length: 100
#     is_required: true               is_insert: true    ← 自动推断
#     query_type: LIKE                is_edit: true      ← 自动推断
#     component: Input                is_list: true      ← 自动推断
#                                     is_query: true     ← 自动推断
#                                     is_required: true
#                                     query_type: LIKE
#                                     java_type: String  ← 自动推断
#                                     component: Input
