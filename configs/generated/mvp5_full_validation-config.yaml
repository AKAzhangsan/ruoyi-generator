table_name: mvp5_full_validation
table_comment: MVP5全组件验证测试表
module: test
business: mvp5_full_validation  # ⚠️ 建议修改为唯一的业务名，如: mvp5fullvalidation
function_name: MVP5全组件验证测试表
sort: 1  # 菜单排序号

columns:
  - name: id
    comment: 主键ID
    type: bigint
    is_pk: true
    is_auto_increment: true
    is_insert: false  # 是否插入字段
    is_edit: false  # 是否编辑字段
    is_list: false  # 是否列表显示
    is_query: false  # 是否查询条件
    is_required: false  # 是否必填
    query_type: EQ  # 查询方式: EQ/NE/GT/GE/LT/LE/LIKE/BETWEEN
    java_type: Long  # Java类型
    component: Input  # 组件类型

  - name: product_name
    comment: 产品名称
    type: varchar
    length: 100
    is_insert: true  # 是否插入字段
    is_edit: true  # 是否编辑字段
    is_list: true  # 是否列表显示
    is_query: true  # 是否查询条件
    is_required: true  # 是否必填
    query_type: LIKE  # 查询方式: EQ/NE/GT/GE/LT/LE/LIKE/BETWEEN
    java_type: String  # Java类型
    component: Input  # 组件类型

  - name: description
    comment: 产品描述
    type: text
    is_insert: true  # 是否插入字段
    is_edit: true  # 是否编辑字段
    is_list: false  # 是否列表显示
    is_query: false  # 是否查询条件
    is_required: false  # 是否必填
    query_type: EQ  # 查询方式: EQ/NE/GT/GE/LT/LE/LIKE/BETWEEN
    java_type: String  # Java类型
    component: Textarea  # 组件类型

  - name: status
    comment: 状态
    type: char
    length: 1
    is_insert: true  # 是否插入字段
    is_edit: true  # 是否编辑字段
    is_list: true  # 是否列表显示
    is_query: true  # 是否查询条件
    is_required: true  # 是否必填
    query_type: EQ  # 查询方式: EQ/NE/GT/GE/LT/LE/LIKE/BETWEEN
    java_type: String  # Java类型
    component: Radio  # 组件类型
    dict_type: sys_normal_disable  # 字典类型

  - name: category
    comment: 产品分类
    type: varchar
    length: 20
    is_insert: true  # 是否插入字段
    is_edit: true  # 是否编辑字段
    is_list: true  # 是否列表显示
    is_query: true  # 是否查询条件
    is_required: true  # 是否必填
    query_type: EQ  # 查询方式: EQ/NE/GT/GE/LT/LE/LIKE/BETWEEN
    java_type: String  # Java类型
    component: Select  # 组件类型
    dict_type: sys_mvp5_product_category  # 字典类型

  - name: tags
    comment: 产品标签
    type: varchar
    length: 200
    is_insert: true  # 是否插入字段
    is_edit: true  # 是否编辑字段
    is_list: true  # 是否列表显示
    is_query: false  # 是否查询条件
    is_required: false  # 是否必填
    query_type: EQ  # 查询方式: EQ/NE/GT/GE/LT/LE/LIKE/BETWEEN
    java_type: String  # Java类型
    component: Checkbox  # 组件类型
    dict_type: sys_mvp5_tags  # 字典类型

  - name: level
    comment: 产品等级
    type: varchar
    length: 50
    is_insert: true  # 是否插入字段
    is_edit: true  # 是否编辑字段
    is_list: true  # 是否列表显示
    is_query: false  # 是否查询条件
    is_required: false  # 是否必填
    query_type: EQ  # 查询方式: EQ/NE/GT/GE/LT/LE/LIKE/BETWEEN
    java_type: String  # Java类型
    component: Checkbox  # 组件类型
    dict_type: sys_mvp5_level  # 字典类型

  - name: stock_quantity
    comment: 库存数量
    type: int
    is_insert: true  # 是否插入字段
    is_edit: true  # 是否编辑字段
    is_list: true  # 是否列表显示
    is_query: true  # 是否查询条件
    is_required: true  # 是否必填
    query_type: BETWEEN  # 查询方式: EQ/NE/GT/GE/LT/LE/LIKE/BETWEEN
    java_type: Integer  # Java类型
    component: InputNumber  # 组件类型

  - name: price
    comment: 产品价格
    type: decimal
    precision: 10
    scale: 2
    is_insert: true  # 是否插入字段
    is_edit: true  # 是否编辑字段
    is_list: true  # 是否列表显示
    is_query: true  # 是否查询条件
    is_required: true  # 是否必填
    query_type: BETWEEN  # 查询方式: EQ/NE/GT/GE/LT/LE/LIKE/BETWEEN
    java_type: BigDecimal  # Java类型
    component: InputNumber  # 组件类型

  - name: main_image
    comment: 主图
    type: varchar
    length: 500
    is_insert: true  # 是否插入字段
    is_edit: true  # 是否编辑字段
    is_list: false  # 是否列表显示
    is_query: false  # 是否查询条件
    is_required: false  # 是否必填
    query_type: EQ  # 查询方式: EQ/NE/GT/GE/LT/LE/LIKE/BETWEEN
    java_type: String  # Java类型
    component: ImageUpload  # 组件类型
    limit: 1  # 数量限制
    file_size: 5  # 大小限制(MB)

  - name: gallery_images
    comment: 图集
    type: varchar
    length: 2000
    is_insert: true  # 是否插入字段
    is_edit: true  # 是否编辑字段
    is_list: false  # 是否列表显示
    is_query: false  # 是否查询条件
    is_required: false  # 是否必填
    query_type: EQ  # 查询方式: EQ/NE/GT/GE/LT/LE/LIKE/BETWEEN
    java_type: String  # Java类型
    component: ImageUpload  # 组件类型
    limit: 9  # 数量限制
    file_size: 5  # 大小限制(MB)

  - name: attachment
    comment: 附件
    type: varchar
    length: 500
    is_insert: true  # 是否插入字段
    is_edit: true  # 是否编辑字段
    is_list: false  # 是否列表显示
    is_query: false  # 是否查询条件
    is_required: false  # 是否必填
    query_type: EQ  # 查询方式: EQ/NE/GT/GE/LT/LE/LIKE/BETWEEN
    java_type: String  # Java类型
    component: FileUpload  # 组件类型
    limit: 3  # 数量限制
    file_size: 10  # 大小限制(MB)

  - name: detail_content
    comment: 详情内容
    type: longtext
    is_insert: true  # 是否插入字段
    is_edit: true  # 是否编辑字段
    is_list: false  # 是否列表显示
    is_query: false  # 是否查询条件
    is_required: false  # 是否必填
    query_type: EQ  # 查询方式: EQ/NE/GT/GE/LT/LE/LIKE/BETWEEN
    java_type: String  # Java类型
    component: Editor  # 组件类型
    height: 350  # 编辑器高度

  - name: production_date
    comment: 生产日期
    type: date
    is_insert: true  # 是否插入字段
    is_edit: true  # 是否编辑字段
    is_list: true  # 是否列表显示
    is_query: true  # 是否查询条件
    is_required: true  # 是否必填
    query_type: BETWEEN  # 查询方式: EQ/NE/GT/GE/LT/LE/LIKE/BETWEEN
    java_type: Date  # Java类型
    component: DatePicker  # 组件类型
    date_format: YYYY-MM-DD  # 日期格式

  - name: expiry_date
    comment: 过期时间
    type: datetime
    is_insert: true  # 是否插入字段
    is_edit: true  # 是否编辑字段
    is_list: true  # 是否列表显示
    is_query: true  # 是否查询条件
    is_required: false  # 是否必填
    query_type: BETWEEN  # 查询方式: EQ/NE/GT/GE/LT/LE/LIKE/BETWEEN
    java_type: Date  # Java类型
    component: DatePicker  # 组件类型
    date_format: YYYY-MM-DD HH:mm:ss  # 日期格式

  - name: create_time
    comment: 创建时间
    type: datetime
    is_insert: false  # 是否插入字段
    is_edit: false  # 是否编辑字段
    is_list: true  # 是否列表显示
    is_query: true  # 是否查询条件
    is_required: false  # 是否必填
    query_type: BETWEEN  # 查询方式: EQ/NE/GT/GE/LT/LE/LIKE/BETWEEN
    java_type: Date  # Java类型
    component: DatePicker  # 组件类型
    date_format: YYYY-MM-DD HH:mm:ss  # 日期格式

dicts:
  - dict_type: sys_mvp5_product_category
    dict_name: MVP5产品分类
    sort: 1
    data:
      - label: 电子产品
        value: 'electronics'
        sort: 1
        is_default: N
        list_class: primary
      - label: 家居用品
        value: 'home'
        sort: 2
        is_default: N
        list_class: success
      - label: 服装配饰
        value: 'clothing'
        sort: 3
        is_default: N
        list_class: warning
      - label: 食品饮料
        value: 'food'
        sort: 4
        is_default: N
        list_class: danger

  - dict_type: sys_mvp5_tags
    dict_name: MVP5产品标签
    sort: 2
    data:
      - label: 新品
        value: 'new'
        sort: 1
        is_default: N
        list_class: success
      - label: 热销
        value: 'hot'
        sort: 2
        is_default: N
        list_class: danger
      - label: 促销
        value: 'promotion'
        sort: 3
        is_default: N
        list_class: warning
      - label: 限量
        value: 'limited'
        sort: 4
        is_default: N
        list_class: info

  - dict_type: sys_mvp5_level
    dict_name: MVP5等级
    sort: 3
    data:
      - label: 一级
        value: '1'
        sort: 1
        is_default: N
      - label: 二级
        value: '2'
        sort: 2
        is_default: N
      - label: 三级
        value: '3'
        sort: 3
        is_default: N
