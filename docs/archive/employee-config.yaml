# =============================================================================
# 员工管理表 - 生成配置
# 简化版YAML格式（带完整组件和校验配置）
# =============================================================================

# -----------------------------------------------------------------------------
# 【基本信息】
# -----------------------------------------------------------------------------
table_name: employee_info
table_comment: 员工信息表
module: hr
business: employee
function_name: 员工管理

# -----------------------------------------------------------------------------
# 【生成配置】
# -----------------------------------------------------------------------------
package_name: com.ruoyi.hr
parent_menu_id: 3
tpl_category: crud
tpl_web_type: element-plus

# -----------------------------------------------------------------------------
# 【自定义字典】
# -----------------------------------------------------------------------------
dicts:
  - dict_type: employee_status
    dict_name: 员工状态
    dict_data:
      - label: 在职
        value: '0'
        sort: 1
      - label: 离职
        value: '1'
        sort: 2
        
  - dict_type: dept_type
    dict_name: 所属部门
    dict_data:
      - label: 技术部
        value: tech
        sort: 1
      - label: 销售部
        value: sales
        sort: 2
      - label: 人事部
        value: hr
        sort: 3
      - label: 财务部
        value: finance
        sort: 4

# =============================================================================
# 【字段列表 - 含显示组件和校验规则】
# =============================================================================

fields:
  # ==========================================================================
  # 1. 员工ID（主键）- 系统自动处理
  # ==========================================================================
  - employee_id: bigint
      primary_key: true
      auto_increment: true
      comment: 员工ID
      
  # ==========================================================================
  # 2. 员工编号 - 文本输入
  # 组件: input（默认）
  # 校验: 必填、唯一
  # ==========================================================================
  - employee_code: varchar(64)
      required: true              # 校验：必填
      unique: true                # 校验：唯一
      query: EQ
      component: input            # 组件：文本输入框
      comment: 员工编号
      
  # ==========================================================================
  # 3. 员工姓名 - 文本输入
  # 组件: input
  # 校验: 必填、长度限制
  # ==========================================================================
  - employee_name: varchar(100)
      required: true
      query: LIKE
      component: input
      comment: 员工姓名
      validation:                   # 校验规则
        max_length: 100             # 最大长度100字符
      
  # ==========================================================================
  # 4. 性别 - 单选按钮
  # 组件: radio（配合字典）
  # 校验: 必填
  # ==========================================================================
  - sex: char(1)
      required: true
      default: '0'
      query: EQ
      component: radio            # 组件：单选按钮组
      dict_type: sys_user_sex     # 使用系统字典
      comment: 性别
      
  # ==========================================================================
  # 5. 所属部门 - 下拉选择
  # 组件: select（配合字典）
  # 校验: 必填
  # ==========================================================================
  - dept: varchar(50)
      required: true
      query: EQ
      component: select           # 组件：下拉选择框
      dict_type: dept_type        # 使用自定义字典
      comment: 所属部门
      
  # ==========================================================================
  # 6. 职位 - 文本输入
  # 组件: input
  # 校验: 无特殊校验
  # ==========================================================================
  - position: varchar(100)
      query: LIKE
      component: input
      comment: 职位
      
  # ==========================================================================
  # 7. 入职日期 - 日期选择
  # 组件: date-picker
  # 校验: 必填、日期格式
  # ==========================================================================
  - entry_date: date
      required: true
      query: BETWEEN
      component: date-picker      # 组件：日期选择器
      format: yyyy-MM-dd          # 日期格式
      comment: 入职日期
      
  # ==========================================================================
  # 8. 手机号 - 文本输入（带格式校验）
  # 组件: input
  # 校验: 手机号格式（正则表达式）
  # ==========================================================================
  - phone: varchar(20)
      query: EQ
      component: input
      comment: 手机号
      validation:                   # 校验规则
        pattern: '^1[3-9]\\d{9}$'   # 正则：手机号格式
        message: '请输入正确的手机号'  # 错误提示
      
  # ==========================================================================
  # 9. 邮箱 - 文本输入（带格式校验）
  # 组件: input
  # 校验: 邮箱格式
  # ==========================================================================
  - email: varchar(100)
      query: EQ
      component: input
      comment: 邮箱
      validation:                   # 校验规则
        type: email                 # 类型：邮箱格式
        message: '请输入正确的邮箱地址'
      
  # ==========================================================================
  # 10. 员工状态 - 下拉选择
  # 组件: select（配合字典）
  # 校验: 必填
  # ==========================================================================
  - status: char(1)
      required: true
      default: '0'
      query: EQ
      component: select           # 组件：下拉选择框
      dict_type: employee_status  # 使用自定义字典
      comment: 员工状态
      
  # ==========================================================================
  # 11. 备注 - 文本域
  # 组件: textarea（多行文本）
  # 校验: 无
  # ==========================================================================
  - remark: text
      query: none
      list: false                 # 不在列表显示
      component: textarea         # 组件：文本域
      rows: 3                     # 显示3行高度
      comment: 备注

# =============================================================================
# 【组件类型速查】
# =============================================================================
# component: input              文本输入框（单行）
# component: number             数字输入框（带增减按钮）
# component: select             下拉选择框（配合dict_type使用）
# component: radio              单选按钮组（配合dict_type使用）
# component: checkbox           多选框
# component: date-picker        日期选择器（配合format使用）
# component: datetime-picker    日期时间选择器
# component: textarea           文本域（多行文本，配合rows使用）
# component: image-upload       图片上传
# component: file-upload        文件上传
# component: editor             富文本编辑器

# =============================================================================
# 【校验规则速查】
# =============================================================================
# validation:
#   required: true                必填（也可在字段级用 required: true）
#   min_length: 2                 最小长度
#   max_length: 50                最大长度
#   min: 0                        最小值（数字）
#   max: 99999                    最大值（数字）
#   pattern: '^[a-zA-Z0-9]+$'     正则表达式
#   type: email                   邮箱格式
#   type: phone                   手机号格式
#   message: '错误提示信息'        自定义错误消息
