table_name: mvp2_test
table_comment: MVP2数字类型测试表
module: test
business: mvp2  # ⚠️ 建议修改为唯一的业务名，如: mvp2test
function_name: MVP2数字类型测试表
sort: 1  # 菜单排序号

columns:
  - name: id
    comment: 主键ID
    type: bigint
    is_pk: true
    is_auto_increment: true
    is_insert: false  # 是否插入字段
    is_edit: false  # 是否编辑字段
    is_list: false  # 是否列表显示
    is_query: false  # 是否查询条件
    is_required: false  # 是否必填
    query_type: EQ  # 查询方式: EQ/NE/GT/GE/LT/LE/LIKE/BETWEEN
    java_type: Long  # Java类型
    component: Input  # 组件类型

  - name: quantity
    comment: 数量
    type: int
    is_insert: true  # 是否插入字段
    is_edit: true  # 是否编辑字段
    is_list: true  # 是否列表显示
    is_query: true  # 是否查询条件
    is_required: true  # 是否必填
    query_type: BETWEEN  # 查询方式: EQ/NE/GT/GE/LT/LE/LIKE/BETWEEN
    java_type: Integer  # Java类型
    component: InputNumber  # 组件类型

  - name: price
    comment: 价格
    type: decimal
    precision: 10
    scale: 2
    is_insert: true  # 是否插入字段
    is_edit: true  # 是否编辑字段
    is_list: true  # 是否列表显示
    is_query: true  # 是否查询条件
    is_required: true  # 是否必填
    query_type: BETWEEN  # 查询方式: EQ/NE/GT/GE/LT/LE/LIKE/BETWEEN
    java_type: BigDecimal  # Java类型
    component: InputNumber  # 组件类型

  - name: weight
    comment: 重量
    type: float
    is_insert: true  # 是否插入字段
    is_edit: true  # 是否编辑字段
    is_list: true  # 是否列表显示
    is_query: true  # 是否查询条件
    is_required: false  # 是否必填
    query_type: BETWEEN  # 查询方式: EQ/NE/GT/GE/LT/LE/LIKE/BETWEEN
    java_type: Float  # Java类型
    component: InputNumber  # 组件类型

  - name: is_active
    comment: 是否启用
    type: tinyint
    length: 1
    default: 1
    is_insert: true  # 是否插入字段
    is_edit: true  # 是否编辑字段
    is_list: true  # 是否列表显示
    is_query: true  # 是否查询条件
    is_required: false  # 是否必填
    query_type: EQ  # 查询方式: EQ/NE/GT/GE/LT/LE/LIKE/BETWEEN
    java_type: Integer  # Java类型
    component: InputNumber  # 组件类型

  - name: status
    comment: 状态
    type: char
    length: 1
    default: '0'
    is_insert: true  # 是否插入字段
    is_edit: true  # 是否编辑字段
    is_list: true  # 是否列表显示
    is_query: true  # 是否查询条件
    is_required: true  # 是否必填
    query_type: EQ  # 查询方式: EQ/NE/GT/GE/LT/LE/LIKE/BETWEEN
    java_type: String  # Java类型
    component: Input  # 组件类型

  - name: description
    comment: 描述
    type: text
    is_insert: true  # 是否插入字段
    is_edit: true  # 是否编辑字段
    is_list: false  # 是否列表显示
    is_query: false  # 是否查询条件
    is_required: false  # 是否必填
    query_type: EQ  # 查询方式: EQ/NE/GT/GE/LT/LE/LIKE/BETWEEN
    java_type: String  # Java类型
    component: Textarea  # 组件类型

  - name: create_time
    comment: 创建时间
    type: datetime
    is_insert: false  # 是否插入字段
    is_edit: false  # 是否编辑字段
    is_list: true  # 是否列表显示
    is_query: true  # 是否查询条件
    is_required: false  # 是否必填
    query_type: BETWEEN  # 查询方式: EQ/NE/GT/GE/LT/LE/LIKE/BETWEEN
    java_type: Date  # Java类型
    component: DatePicker  # 组件类型
    date_format: YYYY-MM-DD HH:mm:ss  # 日期格式
