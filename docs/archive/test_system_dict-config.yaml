table_name: test_system_dict
table_comment: 测试系统字典检测
module: test
business: test_system_dict  # ⚠️ 建议修改为唯一的业务名，如: testsystemdict
function_name: 测试系统字典检测
sort: 1  # 菜单排序号

columns:
  - name: id
    comment: ID
    type: bigint
    is_pk: true
    is_auto_increment: true
    is_insert: false  # 是否插入字段
    is_edit: false  # 是否编辑字段
    is_list: false  # 是否列表显示
    is_query: false  # 是否查询条件
    is_required: false  # 是否必填
    query_type: EQ  # 查询方式: EQ/NE/GT/GE/LT/LE/LIKE/BETWEEN
    java_type: Long  # Java类型
    component: Input  # 组件类型

  - name: status
    comment: 状态
    type: char
    length: 1
    is_insert: true  # 是否插入字段
    is_edit: true  # 是否编辑字段
    is_list: true  # 是否列表显示
    is_query: false  # 是否查询条件
    is_required: false  # 是否必填
    query_type: EQ  # 查询方式: EQ/NE/GT/GE/LT/LE/LIKE/BETWEEN
    java_type: String  # Java类型
    component: Radio  # 组件类型
    dict_type: sys_normal_disable  # 字典类型

  - name: is_urgent
    comment: 是否紧急
    type: char
    length: 1
    is_insert: true  # 是否插入字段
    is_edit: true  # 是否编辑字段
    is_list: true  # 是否列表显示
    is_query: false  # 是否查询条件
    is_required: false  # 是否必填
    query_type: EQ  # 查询方式: EQ/NE/GT/GE/LT/LE/LIKE/BETWEEN
    java_type: String  # Java类型
    component: Radio  # 组件类型
    dict_type: sys_yes_no  # 字典类型

  - name: category
    comment: 分类
    type: varchar
    length: 20
    is_insert: true  # 是否插入字段
    is_edit: true  # 是否编辑字段
    is_list: true  # 是否列表显示
    is_query: false  # 是否查询条件
    is_required: false  # 是否必填
    query_type: EQ  # 查询方式: EQ/NE/GT/GE/LT/LE/LIKE/BETWEEN
    java_type: String  # Java类型
    component: Select  # 组件类型
    dict_type: sys_test_category  # 字典类型

dicts:
  - dict_type: sys_test_category
    dict_name: 测试分类
    sort: 1
    data:
      - label: A类
        value: 'a'
        sort: 1
        is_default: N
      - label: B类
        value: 'b'
        sort: 2
        is_default: N
