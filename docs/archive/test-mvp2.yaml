# MVP2 测试表 - 测试数字类型和范围查询
table_name: mvp2_test
table_comment: MVP2数字类型测试表
module: test
business: mvp2_test
function_name: MVP2数字类型测试
sort: 3

columns:
  # 主键
  - name: id
    comment: 主键ID
    type: bigint
    is_pk: true
    is_auto_increment: true
    is_insert: false
    is_edit: false
    is_list: false
    is_query: false
    is_required: false
    query_type: EQ
    java_type: Long
    component: Input

  # 整数字段（BETWEEN 查询）
  - name: quantity
    comment: 数量
    type: int
    is_insert: true
    is_edit: true
    is_list: true
    is_query: true
    is_required: true
    query_type: BETWEEN  # 数字类型默认范围查询
    java_type: Integer
    component: InputNumber

  # 金额字段（小数）
  - name: price
    comment: 价格
    type: decimal
    precision: 10
    scale: 2
    is_insert: true
    is_edit: true
    is_list: true
    is_query: true
    is_required: true
    query_type: BETWEEN
    java_type: BigDecimal
    component: InputNumber

  # 浮点数字段
  - name: weight
    comment: 重量
    type: float
    is_insert: true
    is_edit: true
    is_list: true
    is_query: true
    is_required: false
    query_type: BETWEEN
    java_type: Float
    component: InputNumber

  # 是否启用（Boolean - tinyint）
  - name: is_active
    comment: 是否启用
    type: tinyint
    length: 1
    default: 1
    is_insert: true
    is_edit: true
    is_list: true
    is_query: true
    is_required: false
    query_type: EQ  # Boolean 使用等于查询
    java_type: Integer
    component: InputNumber

  # 状态（Radio 组件 - MVP3）
  - name: status
    comment: 状态
    type: char
    length: 1
    default: '0'
    is_insert: true
    is_edit: true
    is_list: true
    is_query: true
    is_required: true
    query_type: EQ
    java_type: String
    component: Input  # MVP3 将改为 Radio

  # 描述
  - name: description
    comment: 描述
    type: text
    is_insert: true
    is_edit: true
    is_list: false
    is_query: false
    is_required: false
    query_type: EQ
    java_type: String
    component: Textarea

  # 创建时间
  - name: create_time
    comment: 创建时间
    type: datetime
    is_insert: false
    is_edit: false
    is_list: true
    is_query: true
    is_required: false
    query_type: BETWEEN
    java_type: Date
    component: DatePicker
    date_format: YYYY-MM-DD HH:mm:ss
