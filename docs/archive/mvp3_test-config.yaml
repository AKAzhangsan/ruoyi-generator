table_name: mvp3_test
table_comment: MVP3字典组件测试表
module: test
business: mvp3_test  # ⚠️ 建议修改为唯一的业务名，如: mvp3test
function_name: MVP3字典组件测试表
sort: 1  # 菜单排序号

columns:
  - name: id
    comment: 主键ID
    type: bigint
    is_pk: true
    is_auto_increment: true
    is_insert: false  # 是否插入字段
    is_edit: false  # 是否编辑字段
    is_list: false  # 是否列表显示
    is_query: false  # 是否查询条件
    is_required: false  # 是否必填
    query_type: EQ  # 查询方式: EQ/NE/GT/GE/LT/LE/LIKE/BETWEEN
    java_type: Long  # Java类型
    component: Input  # 组件类型

  - name: name
    comment: 名称
    type: varchar
    length: 100
    is_insert: true  # 是否插入字段
    is_edit: true  # 是否编辑字段
    is_list: true  # 是否列表显示
    is_query: true  # 是否查询条件
    is_required: true  # 是否必填
    query_type: LIKE  # 查询方式: EQ/NE/GT/GE/LT/LE/LIKE/BETWEEN
    java_type: String  # Java类型
    component: Input  # 组件类型

  - name: status
    comment: 状态
    type: char
    length: 1
    is_insert: true  # 是否插入字段
    is_edit: true  # 是否编辑字段
    is_list: true  # 是否列表显示
    is_query: false  # 是否查询条件
    is_required: true  # 是否必填
    query_type: EQ  # 查询方式: EQ/NE/GT/GE/LT/LE/LIKE/BETWEEN
    java_type: String  # Java类型
    component: Radio  # 组件类型
    dict_type: sys_mvp3_status  # 字典类型

  - name: category
    comment: 分类
    type: varchar
    length: 10
    is_insert: true  # 是否插入字段
    is_edit: true  # 是否编辑字段
    is_list: true  # 是否列表显示
    is_query: true  # 是否查询条件
    is_required: true  # 是否必填
    query_type: EQ  # 查询方式: EQ/NE/GT/GE/LT/LE/LIKE/BETWEEN
    java_type: String  # Java类型
    component: Select  # 组件类型
    dict_type: sys_mvp3_category  # 字典类型

  - name: tags
    comment: 标签
    type: varchar
    length: 200
    is_insert: true  # 是否插入字段
    is_edit: true  # 是否编辑字段
    is_list: true  # 是否列表显示
    is_query: false  # 是否查询条件
    is_required: false  # 是否必填
    query_type: EQ  # 查询方式: EQ/NE/GT/GE/LT/LE/LIKE/BETWEEN
    java_type: String  # Java类型
    component: Checkbox  # 组件类型
    dict_type: sys_mvp3_tags  # 字典类型

  - name: cover_image
    comment: 封面图
    type: varchar
    length: 500
    is_insert: true  # 是否插入字段
    is_edit: true  # 是否编辑字段
    is_list: false  # 是否列表显示
    is_query: false  # 是否查询条件
    is_required: false  # 是否必填
    query_type: EQ  # 查询方式: EQ/NE/GT/GE/LT/LE/LIKE/BETWEEN
    java_type: String  # Java类型
    component: ImageUpload  # 组件类型
    limit: 1  # 数量限制
    file_size: 5  # 大小限制(MB)

  - name: gallery
    comment: 图集
    type: varchar
    length: 2000
    is_insert: true  # 是否插入字段
    is_edit: true  # 是否编辑字段
    is_list: false  # 是否列表显示
    is_query: false  # 是否查询条件
    is_required: false  # 是否必填
    query_type: EQ  # 查询方式: EQ/NE/GT/GE/LT/LE/LIKE/BETWEEN
    java_type: String  # Java类型
    component: ImageUpload  # 组件类型
    limit: 9  # 数量限制
    file_size: 5  # 大小限制(MB)

  - name: attachment
    comment: 附件
    type: varchar
    length: 500
    is_insert: true  # 是否插入字段
    is_edit: true  # 是否编辑字段
    is_list: false  # 是否列表显示
    is_query: false  # 是否查询条件
    is_required: false  # 是否必填
    query_type: EQ  # 查询方式: EQ/NE/GT/GE/LT/LE/LIKE/BETWEEN
    java_type: String  # Java类型
    component: FileUpload  # 组件类型
    limit: 3  # 数量限制
    file_size: 10  # 大小限制(MB)

  - name: content
    comment: 内容
    type: longtext
    is_insert: true  # 是否插入字段
    is_edit: true  # 是否编辑字段
    is_list: false  # 是否列表显示
    is_query: false  # 是否查询条件
    is_required: false  # 是否必填
    query_type: EQ  # 查询方式: EQ/NE/GT/GE/LT/LE/LIKE/BETWEEN
    java_type: String  # Java类型
    component: Editor  # 组件类型
    height: 300  # 编辑器高度

  - name: remark
    comment: 备注
    type: varchar
    length: 500
    is_insert: true  # 是否插入字段
    is_edit: true  # 是否编辑字段
    is_list: true  # 是否列表显示
    is_query: false  # 是否查询条件
    is_required: false  # 是否必填
    query_type: EQ  # 查询方式: EQ/NE/GT/GE/LT/LE/LIKE/BETWEEN
    java_type: String  # Java类型
    component: Textarea  # 组件类型

  - name: create_time
    comment: 创建时间
    type: datetime
    is_insert: false  # 是否插入字段
    is_edit: false  # 是否编辑字段
    is_list: true  # 是否列表显示
    is_query: true  # 是否查询条件
    is_required: false  # 是否必填
    query_type: BETWEEN  # 查询方式: EQ/NE/GT/GE/LT/LE/LIKE/BETWEEN
    java_type: Date  # Java类型
    component: DatePicker  # 组件类型
    date_format: YYYY-MM-DD HH:mm:ss  # 日期格式

dicts:
  - dict_type: sys_mvp3_status
    dict_name: MVP3状态
    sort: 1
    data:
      - label: 启用
        value: '0'
        sort: 1
        is_default: Y
        list_class: success
      - label: 禁用
        value: '1'
        sort: 2
        is_default: N
        list_class: danger
      - label: 待审核
        value: '2'
        sort: 3
        is_default: N
        list_class: warning

  - dict_type: sys_mvp3_category
    dict_name: MVP3分类
    sort: 2
    data:
      - label: 分类A
        value: 'A'
        sort: 1
        is_default: N
      - label: 分类B
        value: 'B'
        sort: 2
        is_default: N
      - label: 分类C
        value: 'C'
        sort: 3
        is_default: N
      - label: 分类D
        value: 'D'
        sort: 4
        is_default: N
      - label: 分类E
        value: 'E'
        sort: 5
        is_default: N

  - dict_type: sys_mvp3_tags
    dict_name: MVP3标签
    sort: 3
    data:
      - label: 热门
        value: 'hot'
        sort: 1
        is_default: N
      - label: 推荐
        value: 'recommend'
        sort: 2
        is_default: N
      - label: 新品
        value: 'new'
        sort: 3
        is_default: N
